appId: com.agubear.weather.app
---
- launchApp:
    clearState: true
- tapOn:
    text: '允許使用 App 時'
    optional: true
- setLocation:
    latitude: 25.0330
    longitude: 121.5654
- extendedWaitUntil:
    visible:
      text: '天氣'
    timeout: 30000
- waitForAnimationToEnd
- tapOn:
    point: 50%,85%
- waitForAnimationToEnd
- assertVisible:
    text: '設定'
- swipe:
    direction: DOWN
    amount: 6
- waitForAnimationToEnd
- assertVisible:
    text: '主題'
- swipe:
    direction: DOWN
    amount: 1
- waitForAnimationToEnd
- tapOn:
    text: '深色'
- waitForAnimationToEnd
- assertVisible:
    text: '深色'
- tapOn:
    text: '淺色'
- waitForAnimationToEnd
- assertVisible:
    text: '淺色'
