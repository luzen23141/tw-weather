name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # 每天凌晨執行一次安全掃描
    - cron: '0 0 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  audit-and-lint:
    name: Audit & Lint Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Run pnpm audit
        run: pnpm audit || true

      - name: ESLint Security Check
        run: pnpm lint 2>&1 | grep -i "security\|dangerous\|unsafe" && echo "⚠️ 發現潛在的安全問題" || echo "✓ ESLint 安全檢查通過"

  secrets-scan:
    name: Secrets & Credentials Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --debug

      - name: Check for .env files
        run: |
          echo "🔍 檢查 .env 文件..."
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E "\.env|\.env\.\w+"; then
            echo "❌ 嚴重：.env 文件被提交！"
            exit 1
          fi
          if [ -f ".env" ]; then
            echo "⚠️ 警告：.env 文件存在於工作目錄（不被追蹤是正確的）"
          fi
          echo "✓ .env 文件檢查通過"

  sonar-scan:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Check for vulnerable dependencies
        run: |
          echo "🔍 檢查依賴安全性..."
          pnpm audit --production || true

      - name: Check outdated packages
        run: |
          echo "🔍 檢查過期的套件..."
          pnpm list --depth=0 || true

  sast:
    name: SAST - Static Application Security Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check licenses
        run: |
          npm install -g license-report || true
          license-report --package=./package.json || true

  report:
    name: Security Report
    runs-on: ubuntu-latest
    if: always()
    needs: [audit-and-lint, secrets-scan, dependency-check, sast, license-check]

    steps:
      - name: Comment PR with security status
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const jobs = context.payload.workflow_run?.jobs || [];
            const failed = jobs.some(job => job.conclusion === 'failure');

            const comment = `## 🔒 Security Scan Results

            ${failed ? '❌ **Security checks failed - Please review**' : '✅ **All security checks passed**'}

            ### Details:
            - [Security Checks Job](${context.payload.workflow_run?.html_url})
            - [Dependency Check Job](${context.payload.workflow_run?.html_url})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
