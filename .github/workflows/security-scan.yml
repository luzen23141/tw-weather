name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  # 第 1 層：審計依賴（並行，有高危漏洞則失敗）
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm

      - name: Audit dependencies for vulnerabilities
        run: pnpm audit --production

  # 第 2 層：敏感信息掃描（並行）
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets using trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug

      - name: Check for .env files in git history
        run: |
          echo "檢查 .env 文件..."
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E "\.env|\.env\.\w+"; then
            echo "❌ 嚴重：.env 文件被提交！"
            exit 1
          fi
          if [ -f ".env" ]; then
            echo "注意：.env 文件存在於工作目錄（不被追蹤是正確的）"
          fi
          echo ".env 文件檢查通過"

  # 最終狀態彙總
  check-suite:
    name: Security Checks Passed
    runs-on: ubuntu-latest
    needs: [dependency-audit, secrets-scan]
    if: always()
    steps:
      - name: Verify all security checks passed
        run: |
          if [ "${{ needs.dependency-audit.result }}" != "success" ] || [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            echo "❌ Security checks failed"
            exit 1
          fi
          echo "✅ All security checks passed"
